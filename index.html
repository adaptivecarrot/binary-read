<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" id="themeColor">
  <title>Binary Dots Trainer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #222222;
      --muted: #6f6f6f;
      --surface: #ffffff;
      --accent: #f2f2f2;
      --border: #dddddd;
      --dot-off: #d7d7d7;
      --dot-on: #111111;
      --success: #067647;
      --success-bg: #ecfdf3;
      --error: #b42318;
      --error-bg: #fef3f2;
      --focus: 0 0 0 3px rgba(34, 34, 34, 0.12);
    }

    body.dark-mode {
      color-scheme: dark;
      --bg: #000000;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --surface: #080808;
      --accent: #1e293b;
      --border: #2d3748;
      --dot-off: #303030;
      --dot-on: #ffffff;
      --success: #6ce9a6;
      --success-bg: #052e1b;
      --error: #fda29b;
      --error-bg: #3b0a08;
      --focus: 0 0 0 3px rgba(248, 250, 252, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    button { font: inherit; }

    main {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 14px;
    }

    .icon-button, .text-button {
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 44px;
      cursor: pointer;
    }

    .icon-button { width: 48px; font-size: 1.15rem; }
    .text-button { padding: 9px 14px; }
    button:focus-visible { outline: none; box-shadow: var(--focus); }
    button:active { background: var(--accent); }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: clamp(18px, 5vw, 28px);
    }

    .dots-wrap { overflow: hidden; padding: 10px 0; }

    .dots {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: center;
      gap: clamp(9px, 3.4vw, 18px);
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    .dot {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--dot-off);
      border: 1px solid var(--border);
    }

    .dot.on { background: var(--dot-on); border-color: var(--dot-on); }

    .answer-panel { margin-top: 24px; }

    .answer-input {
      width: 100%;
      min-height: 62px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      font-size: 2rem;
      font-family: inherit;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    .answer-input::placeholder { color: var(--muted); font-size: 1rem; font-weight: 400; letter-spacing: 0; }
    .answer-input:focus { outline: none; box-shadow: var(--focus); border-color: var(--text); }
    .answer-input:disabled { opacity: 0.8; }

    .message {
      min-height: 48px;
      margin: 10px 0 0;
      padding: 11px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      text-align: center;
      line-height: 1.45;
    }

    .message:empty { padding: 0; min-height: 18px; }
    .message.correct { color: var(--success); background: var(--success-bg); border-color: var(--success); }
    .message.incorrect { color: var(--error); background: var(--error-bg); border-color: var(--error); }

    .keypad {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .key {
      min-height: 58px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1.25rem;
      font-weight: 600;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .key.action { font-size: 0.92rem; font-weight: 500; }
    .key.submit { background: var(--text); color: var(--bg); border-color: var(--text); }
    .key:disabled { opacity: 0.42; cursor: default; }

    .next-button {
      display: none;
      width: 100%;
      min-height: 58px;
      margin-top: 14px;
      border: 1px solid var(--text);
      border-radius: 9px;
      color: var(--bg);
      background: var(--text);
      cursor: pointer;
      font-weight: 650;
    }

    .next-button.visible { display: block; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 12px 5px;
      text-align: center;
    }

    .stat-value {
      display: block;
      overflow: hidden;
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-overflow: ellipsis;
    }

    .stat-label { color: var(--muted); font-size: 0.69rem; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.62);
    }

    .modal-backdrop[hidden] { display: none; }

    .stats-modal {
      width: min(760px, 100%);
      max-height: calc(100dvh - 32px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
    }

    .confirm-backdrop { z-index: 30; }

    .confirm-modal {
      width: min(420px, 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      padding: 22px;
    }

    .confirm-modal h2 { margin: 0 0 8px; font-size: 1.2rem; }
    .confirm-modal p { margin: 0; color: var(--muted); line-height: 1.5; }
    .danger-button { color: var(--error); border-color: var(--error); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .modal-header h2 { margin: 0; font-size: 1.2rem; }
    .modal-actions { display: flex; justify-content: flex-end; flex-wrap: wrap; gap: 10px; margin-top: 18px; }

    @media (max-width: 700px) and (pointer: coarse) {
      .keypad { display: grid; }
    }

    @media (max-width: 390px) {
      body { padding-left: 12px; padding-right: 12px; }
      .card { padding: 16px 12px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <button class="text-button" id="statsButton" type="button">Stats</button>
      <button class="icon-button" id="themeToggle" type="button" aria-label="Use dark mode" title="Toggle dark mode">◐</button>
    </header>

    <section class="card" aria-label="Binary practice">
      <div class="dots-wrap">
        <div class="dots" id="dots" aria-label="Six binary digits"></div>
      </div>

      <div class="answer-panel">
        <form id="answerForm" autocomplete="off">
          <input class="answer-input" id="answerInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder=" " aria-label="Decimal answer">
        </form>
        <p class="message" id="message" aria-live="polite"></p>

        <div class="keypad" id="keypad" aria-label="Number keypad">
          <button class="key" type="button" data-digit="1">1</button>
          <button class="key" type="button" data-digit="2">2</button>
          <button class="key" type="button" data-digit="3">3</button>
          <button class="key" type="button" data-digit="4">4</button>
          <button class="key" type="button" data-digit="5">5</button>
          <button class="key" type="button" data-digit="6">6</button>
          <button class="key" type="button" data-digit="7">7</button>
          <button class="key" type="button" data-digit="8">8</button>
          <button class="key" type="button" data-digit="9">9</button>
          <button class="key action" type="button" id="clearButton">Clear</button>
          <button class="key" type="button" data-digit="0">0</button>
          <button class="key submit action" type="button" id="submitButton">Submit</button>
        </div>
        <button class="next-button" id="nextButton" type="button">Next pattern</button>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="statsBackdrop" hidden>
    <section class="stats-modal" role="dialog" aria-modal="true" aria-labelledby="statsTitle">
      <header class="modal-header">
        <h2 id="statsTitle">Lifetime stats</h2>
        <button class="icon-button" id="closeStatsButton" type="button" aria-label="Close statistics">×</button>
      </header>
      <div class="stats-grid" aria-label="Lifetime statistics">
        <div class="stat-card"><span class="stat-value" id="attemptsStat">0</span><span class="stat-label">answers</span></div>
        <div class="stat-card"><span class="stat-value" id="correctStat">0</span><span class="stat-label">correct</span></div>
        <div class="stat-card"><span class="stat-value" id="incorrectStat">0</span><span class="stat-label">incorrect</span></div>
        <div class="stat-card"><span class="stat-value" id="accuracyStat">—</span><span class="stat-label">accuracy</span></div>
        <div class="stat-card"><span class="stat-value" id="averageStat">—</span><span class="stat-label">average time</span></div>
        <div class="stat-card"><span class="stat-value" id="fastestStat">—</span><span class="stat-label">fastest time</span></div>
        <div class="stat-card"><span class="stat-value" id="bestStreakStat">0</span><span class="stat-label">best streak</span></div>
        <div class="stat-card"><span class="stat-value" id="seenStat">0</span><span class="stat-label">patterns seen</span></div>
        <div class="stat-card"><span class="stat-value" id="streakStat">0</span><span class="stat-label">current streak</span></div>
        <div class="stat-card"><span class="stat-value" id="dueStat">0</span><span class="stat-label">due now</span></div>
      </div>
      <div class="modal-actions">
        <button class="text-button" id="downloadButton" type="button">Download complete CSV</button>
        <button class="text-button" id="resetButton" type="button">Reset all progress</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop confirm-backdrop" id="resetBackdrop" hidden>
    <section class="confirm-modal" role="alertdialog" aria-modal="true" aria-labelledby="resetTitle" aria-describedby="resetDescription">
      <h2 id="resetTitle">Reset all progress?</h2>
      <p id="resetDescription">This permanently deletes the complete question history, timing data, sessions, and summary progress.</p>
      <div class="modal-actions">
        <button class="text-button" id="cancelResetButton" type="button">Cancel</button>
        <button class="text-button danger-button" id="confirmResetButton" type="button">Reset all progress</button>
      </div>
    </section>
  </div>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'binaryDotsTrainer.v5';
      const DAY_MS = 24 * 60 * 60 * 1000;
      const DESIRED_RETENTION = 0.90;
      const FSRS_VERSION = 'FSRS-6';
      const FSRS_WEIGHTS = [0.212, 1.2931, 2.3065, 8.2956, 6.4133, 0.8334, 3.0194, 0.001, 1.8722, 0.1666, 0.796, 1.4835, 0.0614, 0.2629, 1.6483, 0.6014, 1.8729, 0.5425, 0.0912, 0.0658, 0.1542];
      const RATING_AGAIN = 1;
      const RATING_GOOD = 3;
      const createCard = cardId => ({
        cardId,
        difficulty: null,
        stability: null,
        retrievability: null,
        lastReview: null,
        nextReview: null,
        reviewCount: 0,
        lastRating: null
      });
      const freshState = () => ({
        version: 5,
        theme: 'light',
        sessions: [],
        questions: [],
        cards: Array.from({ length: 64 }, (_, cardId) => createCard(cardId)),
        nextSequence: 1,
        game: {
          lastValue: null,
          currentQuestionId: null
        }
      });

      function clamp(value, minimum, maximum) {
        return Math.min(maximum, Math.max(minimum, value));
      }

      function initialDifficulty(rating) {
        return clamp(FSRS_WEIGHTS[4] - Math.exp(FSRS_WEIGHTS[5] * (rating - 1)) + 1, 1, 10);
      }

      function nextDifficulty(difficulty, rating) {
        const delta = -FSRS_WEIGHTS[6] * (rating - 3);
        const damped = difficulty + delta * (10 - difficulty) / 9;
        const easyTarget = initialDifficulty(4);
        return clamp(FSRS_WEIGHTS[7] * easyTarget + (1 - FSRS_WEIGHTS[7]) * damped, 1, 10);
      }

      function retrievability(stability, elapsedDays) {
        if (!stability || elapsedDays <= 0) return 1;
        const decay = FSRS_WEIGHTS[20];
        const factor = Math.pow(0.9, -1 / decay) - 1;
        return Math.pow(1 + factor * elapsedDays / stability, -decay);
      }

      function nextRecallStability(difficulty, stability, recall) {
        return stability * (
          1 + Math.exp(FSRS_WEIGHTS[8]) * (11 - difficulty) * Math.pow(stability, -FSRS_WEIGHTS[9])
          * (Math.exp(FSRS_WEIGHTS[10] * (1 - recall)) - 1)
        );
      }

      function nextForgetStability(difficulty, stability, recall) {
        return FSRS_WEIGHTS[11] * Math.pow(difficulty, -FSRS_WEIGHTS[12])
          * (Math.pow(stability + 1, FSRS_WEIGHTS[13]) - 1)
          * Math.exp(FSRS_WEIGHTS[14] * (1 - recall));
      }

      function nextSameDayStability(stability, rating) {
        const next = stability * Math.exp(FSRS_WEIGHTS[17] * (rating - 3 + FSRS_WEIGHTS[18])) * Math.pow(stability, -FSRS_WEIGHTS[19]);
        return rating >= 3 ? Math.max(stability, next) : next;
      }

      function intervalForStability(stability) {
        const decay = FSRS_WEIGHTS[20];
        const factor = Math.pow(0.9, -1 / decay) - 1;
        return Math.max(1 / 1440, stability / factor * (Math.pow(DESIRED_RETENTION, -1 / decay) - 1));
      }

      function reviewCard(card, result, now) {
        const rating = result ? RATING_GOOD : RATING_AGAIN;
        const firstReview = card.reviewCount === 0 || card.stability === null || card.lastReview === null;
        const elapsedDays = firstReview ? 0 : Math.max(0, (now - card.lastReview) / DAY_MS);
        const recallBefore = firstReview ? 1 : retrievability(card.stability, elapsedDays);
        const difficulty = firstReview ? initialDifficulty(rating) : nextDifficulty(card.difficulty, rating);
        let stability;
        if (firstReview) {
          stability = FSRS_WEIGHTS[rating - 1];
        } else {
          const lastDate = new Date(card.lastReview);
          const reviewDate = new Date(now);
          const sameLocalDay = lastDate.getFullYear() === reviewDate.getFullYear()
            && lastDate.getMonth() === reviewDate.getMonth()
            && lastDate.getDate() === reviewDate.getDate();
          if (sameLocalDay) stability = nextSameDayStability(card.stability, rating);
          else if (rating === RATING_AGAIN) stability = nextForgetStability(card.difficulty, card.stability, recallBefore);
          else stability = nextRecallStability(card.difficulty, card.stability, recallBefore);
        }
        stability = Math.max(1 / 1440, stability);
        const intervalDays = intervalForStability(stability);
        const updated = {
          cardId: card.cardId,
          difficulty,
          stability,
          retrievability: 1,
          lastReview: now,
          nextReview: now + intervalDays * DAY_MS,
          reviewCount: card.reviewCount + 1,
          lastRating: rating === RATING_GOOD ? 'Good' : 'Again'
        };
        return { rating: updated.lastRating, elapsedDays, retrievabilityBefore: recallBefore, intervalDays, updated };
      }

      function makeId() {
        if (globalThis.crypto && typeof globalThis.crypto.randomUUID === 'function') return globalThis.crypto.randomUUID();
        return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}-${Math.random().toString(36).slice(2)}`;
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (saved && saved.version === 5 && Array.isArray(saved.sessions) && Array.isArray(saved.questions) && Array.isArray(saved.cards) && saved.cards.length === 64) {
            return { ...freshState(), ...saved, game: { ...freshState().game, ...saved.game } };
          }
          return freshState();
        } catch (_) {
          return freshState();
        }
      }

      let state = loadState();
      let currentValue = 0;
      let answer = '';
      let answered = false;
      let currentQuestion = null;
      let currentSessionId = null;

      const dots = document.getElementById('dots');
      const answerInput = document.getElementById('answerInput');
      const answerForm = document.getElementById('answerForm');
      const message = document.getElementById('message');
      const keypad = document.getElementById('keypad');
      const nextButton = document.getElementById('nextButton');
      const themeToggle = document.getElementById('themeToggle');
      const themeColor = document.getElementById('themeColor');
      const statsBackdrop = document.getElementById('statsBackdrop');
      const resetBackdrop = document.getElementById('resetBackdrop');
      const mobileKeypad = window.matchMedia('(max-width: 700px) and (pointer: coarse)');

      for (let bit = 5; bit >= 0; bit -= 1) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.dataset.bit = String(bit);
        dots.appendChild(dot);
      }

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (_) { /* Storage may be unavailable in private mode. */ }
      }

      function beginSession() {
        const now = Date.now();
        const session = { sessionId: makeId(), startedAt: now, lastActiveAt: now };
        state.sessions.push(session);
        currentSessionId = session.sessionId;
        saveState();
      }

      function touchSession() {
        const session = state.sessions.find(item => item.sessionId === currentSessionId);
        if (session) session.lastActiveAt = Date.now();
      }

      function answeredQuestions() {
        return state.questions.filter(question => question.status === 'answered');
      }

      function chooseNext(now = Date.now()) {
        const previousValue = state.game.lastValue;
        const due = state.cards
          .filter(card => card.reviewCount > 0 && card.nextReview <= now)
          .sort((a, b) => a.nextReview - b.nextReview);
        const fresh = state.cards.filter(card => card.reviewCount === 0);
        let candidates;
        let source;
        if (due.length) {
          candidates = due;
          source = 'fsrs-due';
        } else if (fresh.length) {
          candidates = fresh;
          source = 'fsrs-new';
        } else {
          candidates = state.cards.slice().sort((a, b) => a.nextReview - b.nextReview);
          source = 'fsrs-earliest';
        }
        const withoutRepeat = candidates.filter(card => card.cardId !== previousValue);
        if (withoutRepeat.length) candidates = withoutRepeat;
        const card = source === 'fsrs-new'
          ? candidates[Math.floor(Math.random() * candidates.length)]
          : candidates[0];
        state.game.lastValue = card.cardId;
        const elapsedDays = card.lastReview === null ? 0 : Math.max(0, (now - card.lastReview) / DAY_MS);
        return {
          value: card.cardId,
          source,
          previousValue,
          dueAt: card.nextReview,
          retrievabilityAtSelection: card.stability === null ? null : retrievability(card.stability, elapsedDays),
          cardState: { ...card }
        };
      }

      function renderDots(value) {
        const binary = value.toString(2).padStart(6, '0');
        [...dots.children].forEach((dot, index) => {
          const on = binary[index] === '1';
          dot.classList.toggle('on', on);
          dot.setAttribute('aria-label', `${32 >> index}: ${on ? 'on' : 'off'}`);
        });
        dots.setAttribute('aria-label', `Binary pattern ${binary.split('').join(' ')}`);
      }

      function updateAnswer() {
        answerInput.value = answer;
      }

      function setKeypadDisabled(disabled) {
        keypad.querySelectorAll('button').forEach(button => { button.disabled = disabled; });
      }

      function configureInput() {
        answerInput.readOnly = mobileKeypad.matches;
        answerInput.inputMode = mobileKeypad.matches ? 'none' : 'numeric';
      }

      function startQuestion() {
        const selection = chooseNext();
        currentValue = selection.value;
        answer = '';
        answered = false;
        message.textContent = '';
        message.className = 'message';
        nextButton.classList.remove('visible');
        setKeypadDisabled(false);
        answerInput.disabled = false;
        configureInput();
        updateAnswer();
        renderDots(currentValue);
        const shownAt = Date.now();
        const sessionSequence = state.questions.filter(question => question.sessionId === currentSessionId).length + 1;
        currentQuestion = {
          questionId: makeId(),
          sessionId: currentSessionId,
          answeredSessionId: null,
          sequence: state.nextSequence,
          sessionSequence,
          status: 'active',
          selectionSource: selection.source,
          previousValue: selection.previousValue,
          binaryPattern: currentValue.toString(2).padStart(6, '0'),
          correctAnswer: currentValue,
          enteredAnswer: '',
          isCorrect: null,
          shownAt,
          answeredAt: null,
          acknowledgedAt: null,
          responseMs: null,
          transitionMs: null,
          streakBefore: calculateSummary().currentStreak,
          streakAfter: null,
          fsrsVersion: FSRS_VERSION,
          desiredRetention: DESIRED_RETENTION,
          fsrsDueAtSelection: selection.dueAt,
          fsrsRetrievabilityAtSelection: selection.retrievabilityAtSelection,
          fsrsDifficultyBefore: selection.cardState.difficulty,
          fsrsStabilityBeforeDays: selection.cardState.stability,
          fsrsReviewCountBefore: selection.cardState.reviewCount,
          fsrsRating: null,
          fsrsElapsedDays: null,
          fsrsRetrievabilityBeforeReview: null,
          fsrsDifficultyAfter: null,
          fsrsStabilityAfterDays: null,
          fsrsIntervalDays: null,
          fsrsNextReview: null
        };
        state.nextSequence += 1;
        state.questions.push(currentQuestion);
        state.game.currentQuestionId = currentQuestion.questionId;
        touchSession();
        saveState();
        if (!mobileKeypad.matches) answerInput.focus({ preventScroll: true });
      }

      function restoreActiveQuestion(question) {
        currentQuestion = question;
        currentValue = question.correctAnswer;
        answer = question.enteredAnswer || '';
        answered = false;
        message.textContent = '';
        message.className = 'message';
        nextButton.classList.remove('visible');
        setKeypadDisabled(false);
        answerInput.disabled = false;
        configureInput();
        updateAnswer();
        renderDots(currentValue);
        if (!mobileKeypad.matches) answerInput.focus({ preventScroll: true });
      }

      function restoreAnsweredQuestion(question) {
        currentQuestion = question;
        currentValue = question.correctAnswer;
        answer = question.enteredAnswer || '';
        answered = true;
        message.textContent = question.isCorrect
          ? `Correct — ${(question.responseMs / 1000).toFixed(2)} seconds.`
          : `Not quite. The answer is ${question.correctAnswer} (${question.binaryPattern}).`;
        message.className = question.isCorrect ? 'message correct' : 'message incorrect';
        setKeypadDisabled(true);
        answerInput.disabled = true;
        updateAnswer();
        renderDots(currentValue);
        nextButton.classList.add('visible');
        nextButton.focus({ preventScroll: true });
      }

      function advanceQuestion() {
        if (!answered || !currentQuestion || currentQuestion.status !== 'answered') return;
        currentQuestion.acknowledgedAt = Date.now();
        currentQuestion.transitionMs = Math.max(0, currentQuestion.acknowledgedAt - currentQuestion.answeredAt);
        state.game.currentQuestionId = null;
        touchSession();
        saveState();
        startQuestion();
      }

      function submitAnswer() {
        if (answered || answer === '' || !currentQuestion) return;
        const answeredAt = Date.now();
        const elapsed = Math.max(1, answeredAt - currentQuestion.shownAt);
        const guess = Number(answer);
        const correct = guess === currentValue;

        answered = true;
        currentQuestion.status = 'answered';
        currentQuestion.answeredSessionId = currentSessionId;
        currentQuestion.enteredAnswer = answer;
        currentQuestion.isCorrect = correct;
        currentQuestion.answeredAt = answeredAt;
        currentQuestion.responseMs = elapsed;
        currentQuestion.streakAfter = correct ? currentQuestion.streakBefore + 1 : 0;
        const fsrsReview = reviewCard(state.cards[currentValue], correct, answeredAt);
        state.cards[currentValue] = fsrsReview.updated;
        currentQuestion.fsrsRating = fsrsReview.rating;
        currentQuestion.fsrsElapsedDays = fsrsReview.elapsedDays;
        currentQuestion.fsrsRetrievabilityBeforeReview = fsrsReview.retrievabilityBefore;
        currentQuestion.fsrsDifficultyAfter = fsrsReview.updated.difficulty;
        currentQuestion.fsrsStabilityAfterDays = fsrsReview.updated.stability;
        currentQuestion.fsrsIntervalDays = fsrsReview.intervalDays;
        currentQuestion.fsrsNextReview = fsrsReview.updated.nextReview;

        message.textContent = correct
          ? `Correct — ${(elapsed / 1000).toFixed(2)} seconds.`
          : `Not quite. The answer is ${currentValue} (${currentValue.toString(2).padStart(6, '0')}).`;
        message.className = correct ? 'message correct' : 'message incorrect';
        setKeypadDisabled(true);
        answerInput.disabled = true;
        nextButton.classList.add('visible');
        touchSession();
        updateStats();
        saveState();
        nextButton.focus({ preventScroll: true });
      }

      function calculateSummary() {
        const attempts = answeredQuestions().sort((a, b) => a.sequence - b.sequence);
        const correct = attempts.filter(question => question.isCorrect).length;
        const times = attempts.map(question => question.responseMs);
        let currentStreak = 0;
        let bestStreak = 0;
        attempts.forEach(question => {
          currentStreak = question.isCorrect ? currentStreak + 1 : 0;
          bestStreak = Math.max(bestStreak, currentStreak);
        });
        const due = state.cards.filter(card => card.reviewCount > 0 && card.nextReview <= Date.now()).length;
        return {
          attempts: attempts.length,
          correct,
          incorrect: attempts.length - correct,
          averageMs: times.length ? times.reduce((sum, time) => sum + time, 0) / times.length : null,
          fastestMs: times.length ? Math.min(...times) : null,
          patternsSeen: new Set(attempts.map(question => question.correctAnswer)).size,
          currentStreak,
          bestStreak,
          due
        };
      }

      function updateStats() {
        const summary = calculateSummary();
        document.getElementById('attemptsStat').textContent = String(summary.attempts);
        document.getElementById('correctStat').textContent = String(summary.correct);
        document.getElementById('incorrectStat').textContent = String(summary.incorrect);
        document.getElementById('accuracyStat').textContent = summary.attempts ? `${Math.round(summary.correct / summary.attempts * 100)}%` : '—';
        document.getElementById('averageStat').textContent = formatTime(summary.averageMs);
        document.getElementById('fastestStat').textContent = formatTime(summary.fastestMs);
        document.getElementById('bestStreakStat').textContent = String(summary.bestStreak);
        document.getElementById('seenStat').textContent = String(summary.patternsSeen);
        document.getElementById('streakStat').textContent = String(summary.currentStreak);
        document.getElementById('dueStat').textContent = String(summary.due);
      }

      function enterDigit(digit) {
        if (answered || answer.length >= 2) return;
        const proposed = answer + digit;
        if (Number(proposed) > 63) return;
        answer = proposed;
        updateAnswer();
        saveDraft();
      }

      function saveDraft() {
        if (!currentQuestion || currentQuestion.status !== 'active') return;
        currentQuestion.enteredAnswer = answer;
        touchSession();
        saveState();
      }

      function applyTheme(theme) {
        state.theme = theme;
        const dark = theme === 'dark';
        document.body.classList.toggle('dark-mode', dark);
        themeToggle.setAttribute('aria-label', dark ? 'Use light mode' : 'Use dark mode');
        themeToggle.title = dark ? 'Use light mode' : 'Use dark mode';
        themeColor.content = dark ? '#000000' : '#ffffff';
        saveState();
      }

      function formatTime(ms) {
        return ms === null || ms === undefined ? '—' : `${(ms / 1000).toFixed(2)}s`;
      }

      function toIso(timestamp) {
        return timestamp === null || timestamp === undefined ? '' : new Date(timestamp).toISOString();
      }

      function csvCell(value) {
        if (value === null || value === undefined) return '';
        const text = typeof value === 'string' ? value : String(value);
        return `"${text.replace(/"/g, '""')}"`;
      }

      function downloadCsv() {
        touchSession();
        saveState();
        const exportedAt = Date.now();
        const columns = [
          'record_type', 'schema_version', 'exported_at_utc', 'theme', 'scheduler_version',
          'desired_retention', 'fsrs_weights',
          'session_id', 'answered_session_id', 'session_started_at_utc', 'session_last_active_at_utc',
          'question_id', 'global_sequence', 'session_sequence', 'status', 'selection_source',
          'previous_value', 'binary_pattern', 'correct_answer', 'entered_answer', 'is_correct',
          'shown_at_utc', 'answered_at_utc', 'acknowledged_at_utc', 'response_ms', 'transition_ms',
          'streak_before', 'streak_after',
          'card_id', 'fsrs_rating', 'fsrs_due_at_selection_utc', 'fsrs_elapsed_days',
          'fsrs_retrievability_at_selection', 'fsrs_retrievability_before_review',
          'fsrs_difficulty_before', 'fsrs_difficulty_after',
          'fsrs_stability_before_days', 'fsrs_stability_after_days',
          'fsrs_review_count_before', 'fsrs_interval_days', 'fsrs_next_review_utc',
          'card_difficulty', 'card_stability_days', 'card_retrievability_at_export',
          'card_last_review_utc', 'card_next_review_utc', 'card_review_count', 'card_last_rating',
          'current_question_id', 'current_last_value'
        ];
        const rows = [];
        const metadata = {
          record_type: 'metadata', schema_version: state.version, exported_at_utc: toIso(exportedAt), theme: state.theme,
          scheduler_version: FSRS_VERSION, desired_retention: DESIRED_RETENTION,
          fsrs_weights: JSON.stringify(FSRS_WEIGHTS),
          current_question_id: state.game.currentQuestionId,
          current_last_value: state.game.lastValue
        };
        rows.push(metadata);
        state.sessions.forEach(session => rows.push({
          record_type: 'session', schema_version: state.version, exported_at_utc: toIso(exportedAt),
          session_id: session.sessionId,
          session_started_at_utc: toIso(session.startedAt),
          session_last_active_at_utc: toIso(session.lastActiveAt)
        }));
        state.questions.forEach(question => rows.push({
          record_type: 'question', schema_version: state.version, exported_at_utc: toIso(exportedAt),
          scheduler_version: question.fsrsVersion, desired_retention: question.desiredRetention,
          session_id: question.sessionId, answered_session_id: question.answeredSessionId,
          question_id: question.questionId,
          global_sequence: question.sequence, session_sequence: question.sessionSequence,
          status: question.status, selection_source: question.selectionSource,
          previous_value: question.previousValue, binary_pattern: question.binaryPattern,
          correct_answer: question.correctAnswer, entered_answer: question.enteredAnswer,
          is_correct: question.isCorrect, shown_at_utc: toIso(question.shownAt),
          answered_at_utc: toIso(question.answeredAt), acknowledged_at_utc: toIso(question.acknowledgedAt),
          response_ms: question.responseMs, transition_ms: question.transitionMs,
          streak_before: question.streakBefore, streak_after: question.streakAfter,
          card_id: question.correctAnswer, fsrs_rating: question.fsrsRating,
          fsrs_due_at_selection_utc: toIso(question.fsrsDueAtSelection),
          fsrs_elapsed_days: question.fsrsElapsedDays,
          fsrs_retrievability_at_selection: question.fsrsRetrievabilityAtSelection,
          fsrs_retrievability_before_review: question.fsrsRetrievabilityBeforeReview,
          fsrs_difficulty_before: question.fsrsDifficultyBefore,
          fsrs_difficulty_after: question.fsrsDifficultyAfter,
          fsrs_stability_before_days: question.fsrsStabilityBeforeDays,
          fsrs_stability_after_days: question.fsrsStabilityAfterDays,
          fsrs_review_count_before: question.fsrsReviewCountBefore,
          fsrs_interval_days: question.fsrsIntervalDays,
          fsrs_next_review_utc: toIso(question.fsrsNextReview)
        }));
        state.cards.forEach(card => {
          const elapsedDays = card.lastReview === null ? 0 : Math.max(0, (exportedAt - card.lastReview) / DAY_MS);
          rows.push({
            record_type: 'card', schema_version: state.version, exported_at_utc: toIso(exportedAt),
            scheduler_version: FSRS_VERSION, desired_retention: DESIRED_RETENTION,
            card_id: card.cardId, card_difficulty: card.difficulty,
            card_stability_days: card.stability,
            card_retrievability_at_export: card.stability === null ? '' : retrievability(card.stability, elapsedDays),
            card_last_review_utc: toIso(card.lastReview), card_next_review_utc: toIso(card.nextReview),
            card_review_count: card.reviewCount, card_last_rating: card.lastRating
          });
        });
        const csv = [columns.map(csvCell).join(','), ...rows.map(row => columns.map(column => csvCell(row[column])).join(','))].join('\r\n');
        const blob = new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `binary-dots-progress-${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function openStats() {
        statsBackdrop.hidden = false;
        try {
          updateStats();
        } catch (error) {
          console.error('Unable to calculate saved statistics.', error);
        }
        document.getElementById('closeStatsButton').focus();
      }

      function closeStats() {
        statsBackdrop.hidden = true;
        document.getElementById('statsButton').focus();
      }

      function openResetDialog() {
        resetBackdrop.hidden = false;
        statsBackdrop.setAttribute('aria-hidden', 'true');
        document.getElementById('cancelResetButton').focus();
      }

      function closeResetDialog() {
        resetBackdrop.hidden = true;
        statsBackdrop.removeAttribute('aria-hidden');
        document.getElementById('resetButton').focus();
      }

      function resetProgress() {
        const theme = state.theme;
        state = freshState();
        state.theme = theme;
        currentQuestion = null;
        answer = '';
        answered = false;
        beginSession();
        updateStats();
        startQuestion();
        closeResetDialog();
      }

      keypad.addEventListener('click', event => {
        const button = event.target.closest('button');
        if (!button) return;
        if (button.dataset.digit !== undefined) enterDigit(button.dataset.digit);
      });
      document.getElementById('clearButton').addEventListener('click', () => {
        if (!answered) {
          answer = '';
          updateAnswer();
          saveDraft();
        }
      });
      document.getElementById('submitButton').addEventListener('click', submitAnswer);
      nextButton.addEventListener('click', advanceQuestion);
      themeToggle.addEventListener('click', () => applyTheme(state.theme === 'dark' ? 'light' : 'dark'));
      document.getElementById('statsButton').addEventListener('click', openStats);
      document.getElementById('downloadButton').addEventListener('click', downloadCsv);
      document.getElementById('closeStatsButton').addEventListener('click', closeStats);
      statsBackdrop.addEventListener('click', event => { if (event.target === statsBackdrop) closeStats(); });
      document.getElementById('resetButton').addEventListener('click', openResetDialog);
      document.getElementById('cancelResetButton').addEventListener('click', closeResetDialog);
      document.getElementById('confirmResetButton').addEventListener('click', resetProgress);
      resetBackdrop.addEventListener('click', event => { if (event.target === resetBackdrop) closeResetDialog(); });
      if (typeof mobileKeypad.addEventListener === 'function') mobileKeypad.addEventListener('change', configureInput);
      else if (typeof mobileKeypad.addListener === 'function') mobileKeypad.addListener(configureInput);

      answerInput.addEventListener('input', () => {
        const cleaned = answerInput.value.replace(/\D/g, '').slice(0, 2);
        answer = cleaned === '' || Number(cleaned) <= 63 ? cleaned : answer;
        updateAnswer();
        saveDraft();
      });
      answerForm.addEventListener('submit', event => {
        event.preventDefault();
        submitAnswer();
      });

      document.addEventListener('keydown', event => {
        if (event.key === 'Escape' && !resetBackdrop.hidden) closeResetDialog();
        else if (event.key === 'Escape' && !statsBackdrop.hidden) closeStats();
        else if (event.key === 'Enter' && answered && statsBackdrop.hidden && resetBackdrop.hidden) advanceQuestion();
      });

      beginSession();
      applyTheme(state.theme);
      configureInput();
      updateStats();
      const savedQuestion = state.questions.find(question => question.questionId === state.game.currentQuestionId);
      if (savedQuestion && savedQuestion.status === 'active') restoreActiveQuestion(savedQuestion);
      else if (savedQuestion && savedQuestion.status === 'answered' && savedQuestion.acknowledgedAt === null) restoreAnsweredQuestion(savedQuestion);
      else startQuestion();

      window.addEventListener('pagehide', () => {
        touchSession();
        saveState();
      });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          touchSession();
          saveState();
        }
      });
    })();
  </script>
</body>
</html>
