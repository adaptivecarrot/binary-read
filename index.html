<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" id="themeColor">
  <title>Binary Dots Trainer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #222222;
      --muted: #6f6f6f;
      --surface: #ffffff;
      --accent: #f2f2f2;
      --border: #dddddd;
      --dot-off: #d7d7d7;
      --dot-on: #111111;
      --success: #067647;
      --success-bg: #ecfdf3;
      --error: #b42318;
      --error-bg: #fef3f2;
      --focus: 0 0 0 3px rgba(34, 34, 34, 0.12);
    }

    body.dark-mode {
      color-scheme: dark;
      --bg: #000000;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --surface: #080808;
      --accent: #1e293b;
      --border: #2d3748;
      --dot-off: #303030;
      --dot-on: #ffffff;
      --success: #6ce9a6;
      --success-bg: #052e1b;
      --error: #fda29b;
      --error-bg: #3b0a08;
      --focus: 0 0 0 3px rgba(248, 250, 252, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    button { font: inherit; }

    main {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 14px;
    }

    .icon-button, .text-button {
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 44px;
      cursor: pointer;
    }

    .icon-button { width: 48px; font-size: 1.15rem; }
    .text-button { padding: 9px 14px; }
    button:focus-visible { outline: none; box-shadow: var(--focus); }
    button:active { background: var(--accent); }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: clamp(18px, 5vw, 28px);
    }

    .dots-wrap { overflow: hidden; padding: 10px 0; }

    .dots {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: center;
      gap: clamp(9px, 3.4vw, 18px);
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    .dot {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--dot-off);
      border: 1px solid var(--border);
    }

    .dot.on { background: var(--dot-on); border-color: var(--dot-on); }

    .answer-panel { margin-top: 24px; }

    .answer-input {
      width: 100%;
      min-height: 62px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      font-size: 2rem;
      font-family: inherit;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    .answer-input::placeholder { color: var(--muted); font-size: 1rem; font-weight: 400; letter-spacing: 0; }
    .answer-input:focus { outline: none; box-shadow: var(--focus); border-color: var(--text); }
    .answer-input:disabled { opacity: 0.8; }

    .message {
      min-height: 48px;
      margin: 10px 0 0;
      padding: 11px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      text-align: center;
      line-height: 1.45;
    }

    .message:empty { padding: 0; min-height: 18px; }
    .message.correct { color: var(--success); background: var(--success-bg); border-color: var(--success); }
    .message.incorrect { color: var(--error); background: var(--error-bg); border-color: var(--error); }

    .keypad {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .key {
      min-height: 58px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1.25rem;
      font-weight: 600;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .key.action { font-size: 0.92rem; font-weight: 500; }
    .key.submit { background: var(--text); color: var(--bg); border-color: var(--text); }
    .key:disabled { opacity: 0.42; cursor: default; }

    .next-button {
      display: none;
      width: 100%;
      min-height: 58px;
      margin-top: 14px;
      border: 1px solid var(--text);
      border-radius: 9px;
      color: var(--bg);
      background: var(--text);
      cursor: pointer;
      font-weight: 650;
    }

    .next-button.visible { display: block; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 12px 5px;
      text-align: center;
    }

    .stat-value {
      display: block;
      overflow: hidden;
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-overflow: ellipsis;
    }

    .stat-label { color: var(--muted); font-size: 0.69rem; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.62);
    }

    .modal-backdrop[hidden] { display: none; }

    .stats-modal {
      width: min(760px, 100%);
      max-height: calc(100dvh - 32px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .modal-header h2 { margin: 0; font-size: 1.2rem; }
    .modal-actions { display: flex; justify-content: flex-end; margin-top: 14px; }

    .history-wrap {
      overflow-x: auto;
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; font-variant-numeric: tabular-nums; }
    th, td { padding: 9px 10px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; background: var(--accent); }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
    tbody tr:last-child td { border-bottom: 0; }
    .empty-history { color: var(--muted); text-align: center; padding: 22px; }

    @media (max-width: 700px) and (pointer: coarse) {
      .keypad { display: grid; }
    }

    @media (max-width: 390px) {
      body { padding-left: 12px; padding-right: 12px; }
      .card { padding: 16px 12px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <button class="text-button" id="statsButton" type="button">Stats</button>
      <button class="icon-button" id="themeToggle" type="button" aria-label="Use dark mode" title="Toggle dark mode">◐</button>
    </header>

    <section class="card" aria-label="Binary practice">
      <div class="dots-wrap">
        <div class="dots" id="dots" aria-label="Six binary digits"></div>
      </div>

      <div class="answer-panel">
        <form id="answerForm" autocomplete="off">
          <input class="answer-input" id="answerInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="Type 0–63, then Enter" aria-label="Decimal answer">
        </form>
        <p class="message" id="message" aria-live="polite"></p>

        <div class="keypad" id="keypad" aria-label="Number keypad">
          <button class="key" type="button" data-digit="1">1</button>
          <button class="key" type="button" data-digit="2">2</button>
          <button class="key" type="button" data-digit="3">3</button>
          <button class="key" type="button" data-digit="4">4</button>
          <button class="key" type="button" data-digit="5">5</button>
          <button class="key" type="button" data-digit="6">6</button>
          <button class="key" type="button" data-digit="7">7</button>
          <button class="key" type="button" data-digit="8">8</button>
          <button class="key" type="button" data-digit="9">9</button>
          <button class="key action" type="button" id="clearButton">Clear</button>
          <button class="key" type="button" data-digit="0">0</button>
          <button class="key submit action" type="button" id="submitButton">Submit</button>
        </div>
        <button class="next-button" id="nextButton" type="button">Next pattern</button>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="statsBackdrop" hidden>
    <section class="stats-modal" role="dialog" aria-modal="true" aria-labelledby="statsTitle">
      <header class="modal-header">
        <h2 id="statsTitle">Lifetime stats</h2>
        <button class="icon-button" id="closeStatsButton" type="button" aria-label="Close statistics">×</button>
      </header>
      <div class="stats-grid" aria-label="Lifetime statistics">
        <div class="stat-card"><span class="stat-value" id="attemptsStat">0</span><span class="stat-label">answers</span></div>
        <div class="stat-card"><span class="stat-value" id="accuracyStat">—</span><span class="stat-label">accuracy</span></div>
        <div class="stat-card"><span class="stat-value" id="averageStat">—</span><span class="stat-label">average</span></div>
        <div class="stat-card"><span class="stat-value" id="bestStreakStat">0</span><span class="stat-label">best streak</span></div>
        <div class="stat-card"><span class="stat-value" id="seenStat">0</span><span class="stat-label">patterns seen</span></div>
        <div class="stat-card"><span class="stat-value" id="streakStat">0</span><span class="stat-label">current streak</span></div>
      </div>
      <div class="history-wrap" id="historyWrap">
        <table id="historyTable">
          <thead><tr><th>Value</th><th>Binary</th><th>Tries</th><th>Accuracy</th><th>Avg.</th><th>Best</th><th>Last</th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
        <div class="empty-history" id="emptyHistory">No answers recorded yet.</div>
      </div>
      <div class="modal-actions"><button class="text-button" id="resetButton" type="button">Reset all progress</button></div>
    </section>
  </div>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'binaryDotsTrainer.v1';
      const emptyPattern = () => ({ attempts: 0, correct: 0, totalMs: 0, bestMs: null, lastMs: null, mistakes: 0 });
      const freshState = () => ({
        version: 1,
        theme: 'light',
        totalAttempts: 0,
        totalCorrect: 0,
        totalCorrectMs: 0,
        streak: 0,
        bestStreak: 0,
        patterns: Array.from({ length: 64 }, emptyPattern),
        deck: [],
        review: [],
        questionsSinceReview: 0,
        lastValue: null
      });

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (!saved || saved.version !== 1 || !Array.isArray(saved.patterns) || saved.patterns.length !== 64) return freshState();
          return { ...freshState(), ...saved };
        } catch (_) {
          return freshState();
        }
      }

      let state = loadState();
      let currentValue = 0;
      let answer = '';
      let startedAt = 0;
      let answered = false;

      const dots = document.getElementById('dots');
      const answerInput = document.getElementById('answerInput');
      const answerForm = document.getElementById('answerForm');
      const message = document.getElementById('message');
      const keypad = document.getElementById('keypad');
      const nextButton = document.getElementById('nextButton');
      const themeToggle = document.getElementById('themeToggle');
      const themeColor = document.getElementById('themeColor');
      const statsBackdrop = document.getElementById('statsBackdrop');
      const mobileKeypad = window.matchMedia('(max-width: 700px) and (pointer: coarse)');

      for (let bit = 5; bit >= 0; bit -= 1) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.dataset.bit = String(bit);
        dots.appendChild(dot);
      }

      function saveState() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) { /* Storage may be unavailable in private mode. */ }
      }

      function shuffle(values) {
        const copy = values.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function isMastered(pattern) {
        return pattern.correct >= 2 && pattern.correct > 0 && pattern.totalMs / pattern.correct <= 3000;
      }

      function refillDeck() {
        const priority = [];
        const mastered = [];
        state.patterns.forEach((pattern, value) => (isMastered(pattern) ? mastered : priority).push(value));
        state.deck = shuffle(priority).concat(shuffle(mastered));
      }

      function weightedChoice() {
        const candidates = state.patterns.map((pattern, value) => {
          const average = pattern.correct ? pattern.totalMs / pattern.correct : 6000;
          const errorRate = pattern.attempts ? pattern.mistakes / pattern.attempts : 1;
          const weight = 1 + errorRate * 5 + Math.max(0, average - 2500) / 1000 + (pattern.attempts === 0 ? 5 : 0);
          return { value, weight: value === state.lastValue ? weight * 0.15 : weight };
        });
        let roll = Math.random() * candidates.reduce((sum, item) => sum + item.weight, 0);
        for (const item of candidates) {
          roll -= item.weight;
          if (roll <= 0) return item.value;
        }
        return candidates[candidates.length - 1].value;
      }

      function chooseNext() {
        let value;
        if (state.review.length && state.questionsSinceReview >= 2) {
          value = state.review.shift();
          state.questionsSinceReview = 0;
        } else {
          if (!state.deck.length) refillDeck();
          value = state.deck.shift();
          state.questionsSinceReview += 1;
        }
        if (value === state.lastValue) value = weightedChoice();
        state.lastValue = value;
        return value;
      }

      function renderDots(value) {
        const binary = value.toString(2).padStart(6, '0');
        [...dots.children].forEach((dot, index) => {
          const on = binary[index] === '1';
          dot.classList.toggle('on', on);
          dot.setAttribute('aria-label', `${32 >> index}: ${on ? 'on' : 'off'}`);
        });
        dots.setAttribute('aria-label', `Binary pattern ${binary.split('').join(' ')}`);
      }

      function updateAnswer() {
        answerInput.value = answer;
      }

      function setKeypadDisabled(disabled) {
        keypad.querySelectorAll('button').forEach(button => { button.disabled = disabled; });
      }

      function configureInput() {
        answerInput.readOnly = mobileKeypad.matches;
        answerInput.inputMode = mobileKeypad.matches ? 'none' : 'numeric';
      }

      function startQuestion() {
        currentValue = chooseNext();
        answer = '';
        answered = false;
        message.textContent = '';
        message.className = 'message';
        nextButton.classList.remove('visible');
        setKeypadDisabled(false);
        answerInput.disabled = false;
        configureInput();
        updateAnswer();
        renderDots(currentValue);
        startedAt = performance.now();
        saveState();
        if (!mobileKeypad.matches) answerInput.focus({ preventScroll: true });
      }

      function addReview(value) {
        if (!state.review.includes(value)) state.review.push(value);
      }

      function submitAnswer() {
        if (answered || answer === '') return;
        const elapsed = Math.max(1, Math.round(performance.now() - startedAt));
        const guess = Number(answer);
        const correct = guess === currentValue;
        const pattern = state.patterns[currentValue];

        answered = true;
        pattern.attempts += 1;
        pattern.lastMs = elapsed;
        state.totalAttempts += 1;

        if (correct) {
          pattern.correct += 1;
          pattern.totalMs += elapsed;
          pattern.bestMs = pattern.bestMs === null ? elapsed : Math.min(pattern.bestMs, elapsed);
          state.totalCorrect += 1;
          state.totalCorrectMs += elapsed;
          state.streak += 1;
          state.bestStreak = Math.max(state.bestStreak, state.streak);
          message.textContent = `Correct — ${(elapsed / 1000).toFixed(2)} seconds.`;
          message.className = 'message correct';
          if (elapsed > 3500) addReview(currentValue);
        } else {
          pattern.mistakes += 1;
          state.streak = 0;
          message.textContent = `Not quite. The answer is ${currentValue} (${currentValue.toString(2).padStart(6, '0')}).`;
          message.className = 'message incorrect';
          addReview(currentValue);
        }

        setKeypadDisabled(true);
        answerInput.disabled = true;
        nextButton.classList.add('visible');
        updateStats();
        saveState();
        nextButton.focus({ preventScroll: true });
      }

      function updateStats() {
        const accuracy = state.totalAttempts ? `${Math.round(state.totalCorrect / state.totalAttempts * 100)}%` : '—';
        const average = state.totalCorrect ? `${(state.totalCorrectMs / state.totalCorrect / 1000).toFixed(1)}s` : '—';
        const seen = state.patterns.filter(pattern => pattern.attempts > 0).length;
        document.getElementById('accuracyStat').textContent = accuracy;
        document.getElementById('averageStat').textContent = average;
        document.getElementById('attemptsStat').textContent = String(state.totalAttempts);
        document.getElementById('bestStreakStat').textContent = String(state.bestStreak);
        document.getElementById('seenStat').textContent = String(seen);
        document.getElementById('streakStat').textContent = String(state.streak);
      }

      function enterDigit(digit) {
        if (answered || answer.length >= 2) return;
        const proposed = answer + digit;
        if (Number(proposed) > 63) return;
        answer = proposed;
        updateAnswer();
      }

      function applyTheme(theme) {
        state.theme = theme;
        const dark = theme === 'dark';
        document.body.classList.toggle('dark-mode', dark);
        themeToggle.setAttribute('aria-label', dark ? 'Use light mode' : 'Use dark mode');
        themeToggle.title = dark ? 'Use light mode' : 'Use dark mode';
        themeColor.content = dark ? '#000000' : '#ffffff';
        saveState();
      }

      function formatTime(ms) {
        return ms === null || ms === undefined ? '—' : `${(ms / 1000).toFixed(2)}s`;
      }

      function renderHistory() {
        updateStats();
        const rows = state.patterns
          .map((pattern, value) => ({ pattern, value }))
          .filter(item => item.pattern.attempts > 0);
        const body = document.getElementById('historyBody');
        body.replaceChildren();
        document.getElementById('historyTable').hidden = rows.length === 0;
        document.getElementById('emptyHistory').hidden = rows.length > 0;
        rows.forEach(({ pattern, value }) => {
          const row = document.createElement('tr');
          const accuracy = Math.round(pattern.correct / pattern.attempts * 100);
          const average = pattern.correct ? pattern.totalMs / pattern.correct : null;
          [
            String(value),
            value.toString(2).padStart(6, '0'),
            String(pattern.attempts),
            `${accuracy}%`,
            formatTime(average),
            formatTime(pattern.bestMs),
            formatTime(pattern.lastMs)
          ].forEach(text => {
            const cell = document.createElement('td');
            cell.textContent = text;
            row.appendChild(cell);
          });
          body.appendChild(row);
        });
      }

      function openStats() {
        renderHistory();
        statsBackdrop.hidden = false;
        document.getElementById('closeStatsButton').focus();
      }

      function closeStats() {
        statsBackdrop.hidden = true;
        document.getElementById('statsButton').focus();
      }

      keypad.addEventListener('click', event => {
        const button = event.target.closest('button');
        if (!button) return;
        if (button.dataset.digit !== undefined) enterDigit(button.dataset.digit);
      });
      document.getElementById('clearButton').addEventListener('click', () => { if (!answered) { answer = ''; updateAnswer(); } });
      document.getElementById('submitButton').addEventListener('click', submitAnswer);
      nextButton.addEventListener('click', startQuestion);
      themeToggle.addEventListener('click', () => applyTheme(state.theme === 'dark' ? 'light' : 'dark'));
      document.getElementById('statsButton').addEventListener('click', openStats);
      document.getElementById('closeStatsButton').addEventListener('click', closeStats);
      statsBackdrop.addEventListener('click', event => { if (event.target === statsBackdrop) closeStats(); });
      mobileKeypad.addEventListener('change', configureInput);

      answerInput.addEventListener('input', () => {
        const cleaned = answerInput.value.replace(/\D/g, '').slice(0, 2);
        answer = cleaned && Number(cleaned) <= 63 ? cleaned : answer;
        updateAnswer();
      });
      answerForm.addEventListener('submit', event => {
        event.preventDefault();
        submitAnswer();
      });

      document.addEventListener('keydown', event => {
        if (event.key === 'Escape' && !statsBackdrop.hidden) closeStats();
        else if (event.key === 'Enter' && answered && statsBackdrop.hidden) startQuestion();
      });

      document.getElementById('resetButton').addEventListener('click', () => {
        if (!confirm('Delete all saved attempts, times, and mastery progress?')) return;
        const theme = state.theme;
        state = freshState();
        state.theme = theme;
        saveState();
        updateStats();
        renderHistory();
        startQuestion();
      });

      applyTheme(state.theme);
      configureInput();
      updateStats();
      startQuestion();
    })();
  </script>
</body>
</html>
